<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediVision Frontend</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>MediVision</h1>
        <div id="auth-section">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <p id="auth-message"></p>
        </div>
        <div id="main-section" style="display: none;">
            <h2>Patients</h2>
            <button onclick="loadPatients()">Load Patients</button>
            <ul id="patients-list"></ul>

            <div id="patient-detail-section" style="display: none;">
                <h3>Patient Details</h3>
                <input type="text" id="detail-name" placeholder="Name">
                <input type="number" id="detail-age" placeholder="Age">
                <button onclick="updatePatient()">Update Patient</button>
                <button onclick="deletePatient()" style="margin-left: 8px;">Delete Patient</button>
                <p id="patient-detail-message"></p>
            </div>

            <h3>Add Patient</h3>
            <input type="text" id="patient-name" placeholder="Name">
            <input type="number" id="patient-age" placeholder="Age">
            <button onclick="addPatient()">Add Patient</button>
            <p id="patient-message"></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
